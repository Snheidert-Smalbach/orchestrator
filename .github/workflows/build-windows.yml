name: Build Windows App

on:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'src-tauri/**'
      - 'package.json'
      - 'package-lock.json'
      - 'vite.config.*'
      - 'tsconfig*.json'
      - 'tailwind.config.*'
      - 'postcss.config.*'
      - '.github/workflows/build-windows.yml'
  workflow_dispatch:

jobs:
  build-windows:
    name: Build Windows (x64)
    runs-on: windows-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Windows installer
        uses: tauri-apps/tauri-action@v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: --target x86_64-pc-windows-msvc --bundles nsis --ci --no-sign

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-nsis-x64
          path: src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe
          if-no-files-found: error

  publish-windows-preview:
    name: Publish Windows Preview Release
    needs: build-windows
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          pattern: windows-nsis-*
          path: release-assets
          merge-multiple: true

      - name: Publish preview release
        id: publish_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: windows-preview
          name: Windows Preview
          prerelease: true
          draft: false
          body: |
            Unsigned Windows preview build generated automatically from `${{ github.sha }}`.

            Descargas incluidas:
            - Windows x64 NSIS installer (.exe)

            Si Windows SmartScreen muestra una advertencia, usa More info > Run anyway.
          files: release-assets/*.exe
          overwrite_files: true

      - name: Write workflow summary
        run: |
          echo "## Windows Downloads" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Artifacts del run:" >> "$GITHUB_STEP_SUMMARY"
          echo "- windows-nsis-x64" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Release estable para compartir:" >> "$GITHUB_STEP_SUMMARY"
          echo "${{ steps.publish_release.outputs.url }}" >> "$GITHUB_STEP_SUMMARY"
