name: Build Linux App

on:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'src-tauri/**'
      - 'package.json'
      - 'package-lock.json'
      - 'vite.config.*'
      - 'tsconfig*.json'
      - 'tailwind.config.*'
      - 'postcss.config.*'
      - '.github/workflows/build-linux.yml'
  workflow_dispatch:

jobs:
  build-linux:
    name: Build Linux (x64)
    runs-on: ubuntu-22.04
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Linux bundles
        uses: tauri-apps/tauri-action@v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: --target x86_64-unknown-linux-gnu --bundles appimage,deb --ci --no-sign

      - name: Upload AppImage artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-appimage-x64
          path: src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/appimage/*.AppImage
          if-no-files-found: error

      - name: Upload Debian artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-deb-x64
          path: src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/deb/*.deb
          if-no-files-found: error

  publish-linux-preview:
    name: Publish Linux Preview Release
    needs: build-linux
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download Linux artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: linux-*
          path: release-assets
          merge-multiple: true

      - name: Publish preview release
        id: publish_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: linux-preview
          name: Linux Preview
          prerelease: true
          draft: false
          body: |
            Linux preview builds generated automatically from `${{ github.sha }}`.

            Descargas incluidas:
            - Linux x64 AppImage
            - Linux x64 Debian package (.deb)

            Para ejecutar el AppImage normalmente debes dar permisos:
            `chmod +x Back\ Orchestrator*.AppImage`
          files: |
            release-assets/*.AppImage
            release-assets/*.deb
          overwrite_files: true

      - name: Write workflow summary
        run: |
          echo "## Linux Downloads" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Artifacts del run:" >> "$GITHUB_STEP_SUMMARY"
          echo "- linux-appimage-x64" >> "$GITHUB_STEP_SUMMARY"
          echo "- linux-deb-x64" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Release estable para compartir:" >> "$GITHUB_STEP_SUMMARY"
          echo "${{ steps.publish_release.outputs.url }}" >> "$GITHUB_STEP_SUMMARY"
