name: Build macOS App

on:
  workflow_dispatch:

jobs:
  build-macos:
    name: Build macOS (${{ matrix.label }})
    runs-on: macos-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: Apple Silicon
            target: aarch64-apple-darwin
            artifact_name: macos-dmg-apple-silicon
          - label: Intel
            target: x86_64-apple-darwin
            artifact_name: macos-dmg-intel

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install frontend dependencies
        run: npm ci

      - name: Build macOS DMG
        uses: tauri-apps/tauri-action@v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: --target ${{ matrix.target }} --bundles dmg --ci --no-sign

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
          if-no-files-found: error

  publish-macos-preview:
    name: Publish macOS Preview Release
    needs: build-macos
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: macos-dmg-*
          path: release-assets
          merge-multiple: true

      - name: Publish preview release
        id: publish_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: macos-preview
          name: macOS Preview
          prerelease: true
          draft: false
          body: |
            Unsigned macOS preview builds generated automatically from `${{ github.sha }}`.

            Descargas incluidas:
            - Apple Silicon (.dmg)
            - Intel (.dmg)

            Si macOS bloquea la app al abrirla, usa clic derecho > Open
            o ve a Privacy & Security > Open Anyway.
          files: release-assets/*.dmg
          overwrite_files: true

      - name: Write workflow summary
        run: |
          echo "## macOS Downloads" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Artifacts del run:" >> "$GITHUB_STEP_SUMMARY"
          echo "- macos-dmg-apple-silicon" >> "$GITHUB_STEP_SUMMARY"
          echo "- macos-dmg-intel" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Release estable para compartir:" >> "$GITHUB_STEP_SUMMARY"
          echo "${{ steps.publish_release.outputs.url }}" >> "$GITHUB_STEP_SUMMARY"
